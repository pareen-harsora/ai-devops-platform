name: CI-CD Pipeline

on:
  push:
    branches:
    - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build API Docker Image
      run: docker build -t api-service ./services/api

    - name: Build Worker Docker Image
      run: docker build -t worker-service ./services/worker
