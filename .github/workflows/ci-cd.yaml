name: CI-CD Pipeline

on:
  push:
    branches:
    - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Debug Repo Structure
      run: |
        echo "Current directory: $(pwd)"
        echo "Contents:"
        ls -R

    - name: Set Image Tag
      id: vars
      run: echo "TAG=${{ github.run_number }}" >> $GITHUB_ENV

    - name: Build API Image
      run: docker build -t api-service:${{ env.TAG }} ./services/api

    - name: Build Worker Image
      run: docker build -t worker-service:${{ env.TAG }} ./services/worker

    - name: Show Images
      run: docker images
