name: CI-CD Pipeline

on:
  push:
    branches:
    - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Image Tag
      id: vars
      run: echo "TAG=${{ github.run_number }}" >> $GITHUB_ENV

    - name: Build API Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-devops-platform-api:${{ env.TAG }} ./services/api

    - name: Build Worker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-devops-platform-worker:${{ env.TAG }} ./services/worker

    - name: Push API Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-devops-platform-api:${{ env.TAG }}

    - name: Push Worker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-devops-platform-worker:${{ env.TAG }}

    - name: Show Images
      run: docker images
